<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatDaddy AI Agent Dashboard</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --panel: #ffffff;
      --ink: #142523;
      --muted: #6b7b80;
      --line: #d7e2df;
      --green: #0f9f83;
      --blue: #2f72d2;
      --amber: #a96916;
      --red: #bc4d4d;
      --soft-green: #eaf8f4;
      --soft-blue: #edf4ff;
      --soft-amber: #fff5e8;
      --soft-red: #fff0f0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(15, 159, 131, .08), transparent 34rem),
        radial-gradient(circle at 100% 20%, rgba(47, 114, 210, .08), transparent 28rem),
        var(--bg);
      color: var(--ink);
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-weight: 650;
    }

    .setup {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, .7fr) minmax(180px, .7fr) auto;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(12px);
    }

    .setup input,
    .demo-bar select {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      min-width: 0;
      color: var(--ink);
      background: #fff;
    }

    .demo-bar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,.82);
      border: 1px solid #b9e3da;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 16px;
      box-shadow: 0 16px 40px rgba(20, 37, 35, .05);
    }

    .demo-copy {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .demo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 8px rgba(15,159,131,.11);
      flex: 0 0 auto;
    }

    .demo-copy b {
      display: block;
      font-size: 18px;
    }

    .demo-copy span {
      color: var(--muted);
      font-weight: 720;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid #b9e3da;
      background: var(--soft-green);
      color: var(--green);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 900;
      margin-left: 8px;
    }

    .session-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 14px 38px rgba(20, 37, 35, .05);
    }

    .session-title {
      font-weight: 950;
      font-size: 18px;
    }

    .session-subtitle {
      color: var(--muted);
      font-weight: 760;
      margin-top: 2px;
    }

    .session-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: .16s ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: #a9c9c1; }
    .btn.primary { background: linear-gradient(135deg, #0f9f83, #2f72d2); color: #fff; border-color: transparent; }
    .btn.danger { background: var(--soft-red); color: var(--red); border-color: #f0c1c1; }
    .btn.ghost { background: transparent; }
    .hidden { display: none !important; }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,.76);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .stat b { display: block; font-size: 24px; }
    .stat span { color: var(--muted); font-weight: 750; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 850;
      color: var(--muted);
      cursor: pointer;
    }

    .pill.active {
      background: var(--soft-green);
      border-color: #9ed9cc;
      color: var(--ink);
    }

    .view-toggle {
      display: flex;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .view-toggle button {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 850;
      cursor: pointer;
    }

    .view-toggle button.active {
      background: var(--ink);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .grid.list {
      grid-template-columns: 1fr;
    }

    .case-card {
      position: relative;
      min-height: 242px;
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(20, 37, 35, .06);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .case-card:hover {
      transform: translateY(-2px);
      border-color: #a9c9c1;
      box-shadow: 0 20px 52px rgba(20, 37, 35, .10);
    }

    .case-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--green);
    }

    .case-card.medium::before { background: var(--amber); }
    .case-card.high::before { background: var(--red); }
    .case-card.order::before { background: var(--blue); }

    .case-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .case-id {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--soft-green);
      border: 1px solid #b9e3da;
      color: var(--ink);
      font-weight: 950;
      margin-right: 10px;
    }

    .case-name {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .case-name b {
      font-size: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 900;
      background: #fff;
      white-space: nowrap;
    }

    .badge.low { color: var(--green); background: var(--soft-green); border-color: #b9e3da; }
    .badge.medium { color: var(--amber); background: var(--soft-amber); border-color: #ebd1ac; }
    .badge.high { color: var(--red); background: var(--soft-red); border-color: #e9b4b4; }
    .badge.order { color: var(--blue); background: var(--soft-blue); border-color: #b7cdf1; }

    .word-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 76px;
      margin-bottom: 16px;
    }

    .word {
      font-weight: 950;
      line-height: 1;
      padding: 8px 10px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .word.big { font-size: 32px; color: var(--amber); background: var(--soft-amber); }
    .word.mid { font-size: 22px; color: var(--blue); background: var(--soft-blue); }
    .word.small { font-size: 16px; color: var(--green); background: var(--soft-green); }

    .case-message {
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 44px;
    }

    .case-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-weight: 850;
    }

    .panel {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(9, 20, 18, .38);
      z-index: 10;
      padding: 28px;
    }

    .panel.open { display: grid; place-items: center; }

    .panel-card {
      width: min(1180px, 100%);
      max-height: 92vh;
      overflow: hidden;
      background: #fff;
      border-radius: 22px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 90px rgba(0,0,0,.25);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #ffffff, #f1faf8);
    }

    .panel-body {
      overflow: auto;
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, .8fr);
      gap: 18px;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fff;
    }

    .box h3 {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 16px;
    }

    .chat {
      display: grid;
      gap: 12px;
      background:
        linear-gradient(rgba(255,255,255,.78), rgba(255,255,255,.78)),
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(15,159,131,.07) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(47,114,210,.05) 32px);
      min-height: 220px;
    }

    .bubble {
      max-width: 78%;
      padding: 13px 15px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: #fff;
      line-height: 1.55;
      font-weight: 700;
    }

    .bubble.in { justify-self: end; border-right: 4px solid var(--green); }
    .bubble.out { justify-self: start; border-left: 4px solid var(--blue); }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      line-height: 1.55;
      font-weight: 700;
    }

    .action-stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .action-card {
      background: linear-gradient(135deg, var(--soft-green), var(--soft-blue));
      border: 1px solid #b9e3da;
      border-radius: 18px;
      padding: 18px;
    }

    .action-card b {
      display: block;
      font-size: 28px;
      margin: 6px 0 10px;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 210px;
      overflow: auto;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      color: var(--muted);
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 850;
      box-shadow: 0 18px 50px rgba(0,0,0,.22);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .error {
      margin: 12px 0;
      color: var(--red);
      font-weight: 850;
    }

    @media (max-width: 980px) {
      .setup, .demo-bar, .session-bar, .stats, .grid, .panel-body { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
      .panel { padding: 10px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>ReplyPilot AI <span class="mode-tag" id="modeTag">Public Demo</span></h1>
        <div class="subtitle" id="dashboardSubtitle">AI 客服中控台：看 Case、批准回复、转人工、让系统学习</div>
      </div>
      <div class="setup" id="setupPanel">
        <input id="apiUrl" placeholder="API URL: https://your-worker.workers.dev" />
        <input id="projectKey" placeholder="Project Key" />
        <input id="adminToken" placeholder="Admin Token" type="password" />
        <button class="btn primary" id="saveAndLoad">连接真实系统</button>
      </div>
    </div>

    <div class="session-bar" id="sessionBar">
      <div>
        <div class="session-title" id="sessionTitle">Public Demo Workspace</div>
        <div class="session-subtitle" id="sessionSubtitle">Owner / Admin 可以看全部；Staff 只看要处理的顾客。</div>
      </div>
      <div class="session-actions">
        <a class="btn" href="../login.html">切换账号</a>
        <button class="btn ghost" id="logoutBtn">退出</button>
      </div>
    </div>

    <div class="demo-bar">
      <div class="demo-copy">
        <span class="demo-dot"></span>
        <div>
          <b>公开 Demo 模式</b>
          <span>不用登录、不用 Token。先看 AI Agent 怎样处理真实客服场景。</span>
        </div>
      </div>
      <select id="demoScenario">
        <option value="ecommerce">电商成交客服</option>
        <option value="course">课程咨询客服</option>
        <option value="realestate">房地产 Lead 跟进</option>
        <option value="aftersales">售后服务客服</option>
      </select>
      <button class="btn" id="loadDemo">载入 Demo</button>
    </div>

    <div class="stats">
      <div class="stat"><b id="statAll">0</b><span>全部</span></div>
      <div class="stat"><b id="statApproval">0</b><span>要批准</span></div>
      <div class="stat"><b id="statHuman">0</b><span>要人工</span></div>
      <div class="stat"><b id="statOrder">0</b><span>订单</span></div>
      <div class="stat"><b id="statAuto">0</b><span>自动</span></div>
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="pill active" data-filter="all">全部</button>
        <button class="pill" data-filter="approval_required">要批准</button>
        <button class="pill" data-filter="human_required">要人工</button>
        <button class="pill" data-filter="order">订单</button>
        <button class="pill" data-filter="auto" id="autoFilterBtn">自动</button>
      </div>
      <div class="view-toggle">
        <button class="active" id="gridView">Grid</button>
        <button id="listView">List</button>
      </div>
    </div>

    <div id="error" class="error"></div>
    <section id="cases" class="grid"></section>
  </main>

  <div id="panel" class="panel">
    <div class="panel-card">
      <div class="panel-top">
        <div>
          <h1 id="panelName">Customer</h1>
          <div class="subtitle" id="panelMeta">Case detail</div>
        </div>
        <button class="btn ghost" id="closePanel">关闭</button>
      </div>
      <div class="panel-body">
        <div class="left">
          <div class="box chat" id="chatBox"></div>
          <div class="box" style="margin-top: 14px;">
            <h3>AI 建议回复</h3>
            <textarea id="replyBox"></textarea>
          </div>
        </div>
        <aside class="action-stack">
          <div class="action-card">
            <span>Agent Action</span>
            <b id="actionTitle">按「批准发送」</b>
            <p id="actionReason">确认回复后发送。</p>
            <button class="btn primary" id="approveBtn" style="width: 100%;">批准发送</button>
          </div>
          <button class="btn" id="learnBtn">以后类似 Case 自动通过</button>
          <button class="btn danger" id="handoffBtn">转人工</button>
          <div class="box">
            <h3>Word Cloud</h3>
            <div class="word-cloud" id="panelWords"></div>
          </div>
          <div class="box">
            <h3>AI 操作记录</h3>
            <div class="history" id="historyBox"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Done</div>

  <script>
    const state = {
      cases: [],
      filter: "all",
      active: null,
      demoMode: true,
      scenario: "ecommerce",
      role: "owner",
      session: {},
    };

    const $ = (id) => document.getElementById(id);
    const apiUrlEl = $("apiUrl");
    const projectKeyEl = $("projectKey");
    const adminTokenEl = $("adminToken");
    const casesEl = $("cases");
    const errorEl = $("error");
    const demoScenarioEl = $("demoScenario");

    const DEMO_SCENARIOS = {
      ecommerce: [
        demoCase({
          id: "case-001",
          name: "Maya Lim",
          status: "approval_required",
          risk: "medium",
          stage: "CLOSING",
          action: "approve_reply",
          intent: "price_objection",
          words: ["嫌贵", "已看价", "考虑一下", "成交回复", "中风险"],
          customer: "有点贵，我考虑一下",
          reply: "明白的 Maya，价钱会考虑是正常的。你先不要只看单盒价格，重点是它能不能解决你现在最在意的问题。你比较担心的是效果、价格，还是安全？",
          reason: "看价后异议，不继续普通 Flow，改用成交回复。",
        }),
        demoCase({
          id: "case-002",
          name: "Aina",
          status: "human_required",
          risk: "high",
          stage: "HUMAN",
          action: "ask_human",
          intent: "complaint",
          words: ["投诉", "生气", "停止 Automation", "高风险"],
          customer: "你们一直催很烦，我要投诉",
          reply: "我先帮你停止自动跟进，并转给人工同事处理。我们会看清楚记录后再回复你。",
          reason: "投诉和负面情绪必须转人工，避免 AI 继续推销。",
        }),
        demoCase({
          id: "case-003",
          name: "Chloe",
          status: "order",
          risk: "low",
          stage: "ORDER",
          action: "collect_order",
          intent: "buy_intent",
          words: ["可提交", "COD", "资料完整", "地址", "订单"],
          customer: "Chloe 0120000000 No 12 Jalan Demo，我要 COD",
          reply: "收到 Chloe，资料已经齐全。我会帮你提交 COD 订单，确认后会通知你。",
          reason: "名字、电话、地址、付款方式齐全，可以提交订单。",
        }),
        demoCase({
          id: "case-004",
          name: "Joanne",
          status: "approval_required",
          risk: "medium",
          stage: "ORDER",
          action: "review_receipt",
          intent: "receipt",
          words: ["Receipt", "金额不对", "先审核", "付款"],
          customer: "[Receipt image uploaded] RM149",
          reply: "收到，我先帮你检查付款资料。金额需要确认一下，确认没问题后才继续处理订单。",
          reason: "Receipt 金额不清楚，不能自动通过。",
        }),
        demoCase({
          id: "case-005",
          name: "Nadia",
          status: "auto",
          risk: "low",
          stage: "S1",
          action: "send_reply",
          intent: "faq",
          words: ["问用法", "多久有效", "看价前", "接 Step 2"],
          customer: "一天喝几次？多久看到效果？",
          reply: "通常一天 1-2 次，效果会看个人体质和配合度。多数顾客会先感觉排便和肚子比较轻。我先帮你看它主要怎样帮你处理。",
          reason: "低风险 FAQ，可以自动回复后接下一步。",
        }),
        demoCase({
          id: "case-006",
          name: "May",
          status: "auto",
          risk: "low",
          stage: "FOLLOW_UP",
          action: "send_reply",
          intent: "follow_up",
          words: ["没回复", "6小时", "Follow-up", "轻提醒"],
          customer: "看价后暂时没有回复",
          reply: "May，我先帮你保留今天的优惠。如果你还在比较，我可以直接帮你算哪个配套比较适合。",
          reason: "低风险跟进，不催促，轻 CTA。",
        }),
      ],
      course: [
        demoCase({
          id: "course-001",
          name: "Daniel",
          status: "approval_required",
          risk: "medium",
          stage: "CLOSING",
          action: "approve_reply",
          intent: "price_objection",
          words: ["学费贵", "ROI", "考虑", "成交回复"],
          customer: "课程有点贵，我再想想",
          reply: "明白的 Daniel。你先不要只看学费，重点是这堂课能不能帮你少走弯路、直接做出结果。你比较担心的是时间、学不会，还是回本速度？",
          reason: "价格异议，AI 转成 ROI 角度，不直接硬推。",
        }),
        demoCase({
          id: "course-002",
          name: "Elaine",
          status: "auto",
          risk: "low",
          stage: "S1",
          action: "send_reply",
          intent: "faq",
          words: ["适合新手", "时间", "课程内容", "低风险"],
          customer: "新手可以学吗？一周要花多久？",
          reply: "可以，新手可以跟。建议一周预留 3-4 小时，先跟着步骤完成作业，不需要一开始就很专业。",
          reason: "课程 FAQ，可自动回复。",
        }),
        demoCase({
          id: "course-003",
          name: "Farah",
          status: "human_required",
          risk: "high",
          stage: "HUMAN",
          action: "ask_human",
          intent: "refund",
          words: ["退款", "争议", "人工", "高风险"],
          customer: "如果我上了没效果，可以马上退款吗？",
          reply: "退款政策我先不乱承诺，我帮你转给同事确认条款后回复你。",
          reason: "退款条款必须人工确认。",
        }),
      ],
      realestate: [
        demoCase({
          id: "home-001",
          name: "Mr Wong",
          status: "approval_required",
          risk: "medium",
          stage: "S2",
          action: "approve_reply",
          intent: "budget_check",
          words: ["预算", "贷款", "地点", "跟进"],
          customer: "我预算大概 500k，想看靠近 PJ 的",
          reply: "可以的 Mr Wong。500k 靠近 PJ 要看你优先交通、面积还是新旧楼。我先帮你筛掉不适合的，再安排 2-3 个比较值得看的选择。",
          reason: "需要确认需求，不能乱推荐单位。",
        }),
        demoCase({
          id: "home-002",
          name: "Siti",
          status: "auto",
          risk: "low",
          stage: "S1",
          action: "send_reply",
          intent: "faq",
          words: ["贷款", "首期", "资格", "低风险"],
          customer: "买房需要多少首期？",
          reply: "一般要看贷款资格和项目条件。你可以先告诉我预算、收入范围和想买来自住还是投资，我再帮你大概判断。",
          reason: "通用咨询，可自动回复。",
        }),
        demoCase({
          id: "home-003",
          name: "Jason",
          status: "human_required",
          risk: "high",
          stage: "HUMAN",
          action: "ask_human",
          intent: "legal_sensitive",
          words: ["合约", "法律", "高风险", "人工"],
          customer: "签了 SPA 可以无条件取消吗？",
          reply: "这个涉及合约条款，我先帮你转给专业同事确认，不乱给法律建议。",
          reason: "法律相关问题必须转人工。",
        }),
      ],
      aftersales: [
        demoCase({
          id: "service-001",
          name: "Grace",
          status: "human_required",
          risk: "high",
          stage: "HUMAN",
          action: "ask_human",
          intent: "complaint",
          words: ["没收到货", "生气", "物流", "人工"],
          customer: "三天了还没收到货，你们到底有没有发？",
          reply: "我先帮你暂停自动回复，并转给同事查物流单号。查到后会直接回复你。",
          reason: "售后投诉需要人工查订单。",
        }),
        demoCase({
          id: "service-002",
          name: "Kevin",
          status: "order",
          risk: "medium",
          stage: "ORDER",
          action: "review_receipt",
          intent: "receipt",
          words: ["付款截图", "待审核", "订单", "Receipt"],
          customer: "我已经付款了，截图发你",
          reply: "收到，我先帮你核对付款截图。确认后会更新订单状态。",
          reason: "付款截图需要审核。",
        }),
        demoCase({
          id: "service-003",
          name: "Mei",
          status: "auto",
          risk: "low",
          stage: "S1",
          action: "send_reply",
          intent: "faq",
          words: ["换地址", "未发货", "低风险", "自动"],
          customer: "还没发货的话可以换地址吗？",
          reply: "可以，如果还没发货通常可以更换。麻烦你发新的收件人、电话和完整地址，我帮你记录。",
          reason: "低风险售后 FAQ，可自动回复。",
        }),
      ],
    };

    const params = new URLSearchParams(window.location.search);
    state.session = readSession();
    state.role = params.get("role") || state.session.role || "owner";

    apiUrlEl.value = params.get("api") || state.session.apiUrl || localStorage.getItem("agent_api_url") || "";
    projectKeyEl.value = params.get("project_key") || state.session.projectKey || localStorage.getItem("agent_project_key") || "demo";
    adminTokenEl.value = localStorage.getItem("agent_admin_token") || "";

    applySessionShell();

    $("saveAndLoad").addEventListener("click", () => {
      localStorage.setItem("agent_api_url", apiUrlEl.value.trim());
      localStorage.setItem("agent_project_key", projectKeyEl.value.trim());
      localStorage.setItem("agent_admin_token", adminTokenEl.value.trim());
      loadCases();
    });

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("agent_session");
      window.location.href = "../login.html";
    });

    $("loadDemo").addEventListener("click", () => loadDemoCases());

    $("gridView").addEventListener("click", () => setView("grid"));
    $("listView").addEventListener("click", () => setView("list"));
    $("closePanel").addEventListener("click", () => $("panel").classList.remove("open"));
    $("approveBtn").addEventListener("click", approveActive);
    $("learnBtn").addEventListener("click", learnActive);
    $("handoffBtn").addEventListener("click", handoffActive);

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-filter]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.filter = button.dataset.filter;
        render();
      });
    });

    function readSession() {
      try {
        return JSON.parse(localStorage.getItem("agent_session") || "{}") || {};
      } catch {
        return {};
      }
    }

    function applySessionShell() {
      const workspace = projectKeyEl.value || state.session.workspace || "demo";
      const name = state.session.displayName || (state.role === "staff" ? "Staff" : "Owner");
      const roleLabel = roleName(state.role);

      $("sessionTitle").textContent = `${workspace.toUpperCase()} · ${roleLabel} · ${name}`;
      $("sessionSubtitle").textContent = roleSubtitle(state.role);

      $("dashboardSubtitle").textContent = state.role === "staff"
        ? "客服工作台：只看要批准、要人工、订单"
        : "AI 客服中控台：看 Case、批准回复、转人工、让系统学习";

      $("setupPanel").classList.toggle("hidden", state.role === "staff");
      $("autoFilterBtn").classList.toggle("hidden", state.role === "staff");
      $("learnBtn").classList.toggle("hidden", state.role === "staff");
    }

    function roleName(role) {
      const map = { owner: "Owner", admin: "Admin", staff: "Staff" };
      return map[role] || "Owner";
    }

    function roleSubtitle(role) {
      if (role === "staff") return "只显示客服该处理的顾客，不显示 Token、API、系统设置和自动 Case。";
      if (role === "admin") return "可以处理 Case、复盘 AI 决定、检查学习规则。";
      return "可以看全部项目、系统状态、真实连接和团队入口。";
    }

    function casesForRole(cases) {
      if (state.role !== "staff") return cases;
      return cases.filter((item) => ["approval_required", "human_required", "order", "send_failed"].includes(item.status));
    }

    function setView(view) {
      $("gridView").classList.toggle("active", view === "grid");
      $("listView").classList.toggle("active", view === "list");
      casesEl.classList.toggle("list", view === "list");
    }

    async function loadCases() {
      errorEl.textContent = "";
      const api = apiUrlEl.value.trim().replace(/\/$/, "");
      const project = projectKeyEl.value.trim() || "demo";
      const token = adminTokenEl.value.trim();

      if (!api || !token) {
        loadDemoCases();
        showToast("已载入公开 Demo。连接真实系统才需要 API URL 和 Admin Token。");
        return;
      }

      try {
        const res = await fetch(`${api}/api/cases?project_key=${encodeURIComponent(project)}`, {
          headers: { "x-admin-token": token },
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
        state.demoMode = false;
        $("modeTag").textContent = "Live API";
        state.cases = data.cases || [];
        render();
      } catch (error) {
        errorEl.textContent = `连接失败：${error.message}`;
      }
    }

    function loadDemoCases() {
      state.demoMode = true;
      state.scenario = demoScenarioEl.value || "ecommerce";
      $("modeTag").textContent = "Public Demo";
      errorEl.textContent = "";
      state.cases = clone(DEMO_SCENARIOS[state.scenario] || DEMO_SCENARIOS.ecommerce);
      render();
    }

    function render() {
      const all = casesForRole(state.cases);
      $("statAll").textContent = all.length;
      $("statApproval").textContent = all.filter((item) => item.status === "approval_required").length;
      $("statHuman").textContent = all.filter((item) => item.status === "human_required").length;
      $("statOrder").textContent = all.filter((item) => item.status === "order").length;
      $("statAuto").textContent = all.filter((item) => item.status === "auto").length;

      if (state.role === "staff" && state.filter === "auto") state.filter = "all";
      const visible = state.filter === "all" ? all : all.filter((item) => item.status === state.filter);
      casesEl.innerHTML = visible.map(cardHtml).join("") || emptyHtml();

      casesEl.querySelectorAll("[data-case-id]").forEach((card) => {
        card.addEventListener("click", () => openCase(card.dataset.caseId));
      });
    }

    function cardHtml(item) {
      const decision = item.latest_decision || {};
      const riskClass = decision.risk === "high" ? "high" : item.status === "order" ? "order" : decision.risk === "medium" ? "medium" : "low";
      const words = (item.word_cloud || decision.keywords || []).slice(0, 5);
      const initials = (item.contact?.name || "C").split(/\s+/).map((part) => part[0]).join("").slice(0, 2).toUpperCase();

      return `
        <article class="case-card ${riskClass}" data-case-id="${escapeHtml(item.id)}">
          <div class="case-head">
            <div class="case-name">
              <span class="case-id">${escapeHtml(initials)}</span>
              <b>${escapeHtml(item.contact?.name || "Customer")}</b>
            </div>
            <span class="badge ${riskClass}">${escapeHtml(statusLabel(item.status, decision.risk))}</span>
          </div>
          <div class="word-cloud">
            ${words.map((word, index) => `<span class="word ${index === 0 ? "big" : index < 3 ? "mid" : "small"}">${escapeHtml(word)}</span>`).join("")}
          </div>
          <div class="case-message">${escapeHtml(item.last_message || "")}</div>
          <div class="case-foot">
            <span>Agent: ${escapeHtml(actionLabel(decision.action))}</span>
            <span>${formatDate(item.updated_at)}</span>
          </div>
        </article>
      `;
    }

    function openCase(caseId) {
      const item = state.cases.find((record) => record.id === caseId);
      if (!item) return;
      state.active = item;

      const decision = item.latest_decision || {};
      $("panelName").textContent = item.contact?.name || "Customer";
      $("panelMeta").textContent = `${statusLabel(item.status, decision.risk)} · ${decision.stage || "S1"} · ${formatDate(item.updated_at)}`;
      $("replyBox").value = decision.reply_message || "";
      $("actionTitle").textContent = decision.action === "ask_human" ? "按「转人工」" : decision.send_now ? "可自动发送" : "按「批准发送」";
      $("actionReason").textContent = decision.reason || "确认回复后发送。";

      $("chatBox").innerHTML = (item.messages || []).map((msg) => {
        const klass = msg.direction === "outbound" ? "out" : "in";
        return `<div class="bubble ${klass}">${escapeHtml(msg.text || "")}</div>`;
      }).join("") + `<div class="bubble out">${escapeHtml(decision.reply_message || "")}</div>`;

      $("panelWords").innerHTML = (item.word_cloud || []).map((word, index) => {
        return `<span class="word ${index === 0 ? "big" : index < 3 ? "mid" : "small"}">${escapeHtml(word)}</span>`;
      }).join("");

      $("historyBox").innerHTML = (item.history || []).slice().reverse().map((event) => {
        return `<div class="history-item">${escapeHtml(formatDate(event.at))} · ${escapeHtml(event.type || "")}<br>${escapeHtml(event.decision?.reason || event.note || event.rule_id || "")}</div>`;
      }).join("");

      $("panel").classList.add("open");
    }

    async function approveActive() {
      if (!state.active) return;
      await postCaseAction(state.active.id, "approve", { reply_message: $("replyBox").value });
    }

    async function learnActive() {
      if (!state.active) return;
      await postCaseAction(state.active.id, "learn", {});
    }

    async function handoffActive() {
      if (!state.active) return;
      await postCaseAction(state.active.id, "handoff", { note: "Marked by dashboard operator" });
    }

    async function postCaseAction(caseId, action, body) {
      if (state.demoMode) {
        handleDemoAction(caseId, action, body);
        return;
      }

      const api = apiUrlEl.value.trim().replace(/\/$/, "");
      const project = projectKeyEl.value.trim() || "demo";
      const token = adminTokenEl.value.trim();

      try {
        const res = await fetch(`${api}/api/cases/${encodeURIComponent(caseId)}/${action}?project_key=${encodeURIComponent(project)}`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-admin-token": token,
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
        await loadCases();
        if (data.case) openCase(data.case.id);
      } catch (error) {
        alert(`操作失败：${error.message}`);
      }
    }

    function handleDemoAction(caseId, action, body) {
      const record = state.cases.find((item) => item.id === caseId);
      if (!record) return;
      const now = new Date().toISOString();

      if (action === "approve") {
        record.status = "sent";
        record.latest_reply_sent = body.reply_message;
        record.messages.push({ direction: "outbound", text: body.reply_message, at: now });
        record.history.push({
          type: "approved_sent_demo",
          at: now,
          note: "Demo: 已批准发送，不会真的发 WhatsApp。",
        });
        showToast("Demo：已批准发送，不会真的发 WhatsApp。");
      }

      if (action === "learn") {
        record.history.push({
          type: "learned_rule_created_demo",
          at: now,
          rule_id: `demo-rule-${Math.random().toString(16).slice(2, 8)}`,
          note: "Demo: 以后类似 Case 可减少审批。",
        });
        showToast("Demo：已建立学习规则。");
      }

      if (action === "handoff") {
        record.status = "human_required";
        record.latest_decision.risk = "high";
        record.latest_decision.action = "ask_human";
        record.history.push({
          type: "marked_handoff_demo",
          at: now,
          note: "Demo: 已转人工。",
        });
        showToast("Demo：已转人工。");
      }

      record.updated_at = now;
      render();
      openCase(caseId);
    }

    function emptyHtml() {
      return `
        <div class="box" style="grid-column: 1 / -1;">
          <h3>还没有 Case</h3>
          <p class="subtitle">确认 ChatDaddy webhook 已经指向 Worker，然后用真实 WhatsApp 发一条测试消息。</p>
        </div>
      `;
    }

    function demoCase(config) {
      const now = new Date();
      const createdAt = new Date(now.getTime() - Math.floor(Math.random() * 90 + 8) * 60 * 1000).toISOString();
      return {
        id: config.id,
        project_key: "demo",
        status: config.status,
        contact: {
          id: `contact-${config.id}`,
          name: config.name,
          phone: "+60000000000",
        },
        last_message: config.customer,
        last_message_at: createdAt,
        updated_at: createdAt,
        created_at: createdAt,
        word_cloud: config.words,
        latest_decision: {
          reply_message: config.reply,
          intent: config.intent,
          stage: config.stage,
          risk: config.risk,
          action: config.action,
          send_now: config.status === "auto",
          reason: config.reason,
          keywords: config.words,
          source: "demo",
        },
        messages: [
          {
            id: `${config.id}-in`,
            direction: "inbound",
            text: config.customer,
            at: createdAt,
          },
        ],
        history: [
          {
            type: "message_received_demo",
            at: createdAt,
            note: "ChatDaddy webhook 收到顾客消息。",
          },
          {
            type: "ai_decision_demo",
            at: createdAt,
            decision: { reason: config.reason },
          },
        ],
      };
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function statusLabel(status, risk) {
      if (status === "approval_required") return "待批准";
      if (status === "human_required") return "要人工";
      if (status === "order") return "订单";
      if (status === "auto") return "自动";
      if (status === "sent") return "已发送";
      if (status === "send_failed") return "发送失败";
      if (risk === "high") return "高风险";
      if (risk === "medium") return "中风险";
      return "低风险";
    }

    function actionLabel(action) {
      const map = {
        send_reply: "自动回复",
        approve_reply: "批准发送",
        ask_human: "转人工",
        collect_order: "收订单",
        review_receipt: "审 Receipt",
        trigger_flow: "接 Flow",
        wait: "等待",
      };
      return map[action] || action || "判断";
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-MY", { dateStyle: "short", timeStyle: "short" });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadDemoCases();
  </script>
</body>
</html>
