<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>CTG Supply Chain Portal</title>
  <style>
    :root {
      --canvas: #f4f2ef;
      --card: #ffffff;
      --ink: #1d2736;
      --muted: #4c586a;
      --placeholder: #9da6b6;
      --line: #e3dcd2;
      --brand: #2a5b56;
      --brand-hover: #224d49;
      --danger: #b42318;
      --success: #087568;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 44px 24px 98px;
      color: var(--ink);
      background: var(--canvas);
    }

    button, input { font: inherit; }

    .login-card {
      width: min(768px, 100%);
      min-height: 922px;
      padding: 64px 64px 58px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      border: 2px solid var(--line);
      border-radius: 31px;
      background: var(--card);
      box-shadow: 0 18px 28px rgba(29, 39, 54, .13);
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo {
      width: 98px;
      height: 98px;
      display: block;
      border-radius: 25px;
    }

    h1 {
      margin: 26px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(39px, 4.6vw, 43px);
      line-height: 1.12;
      letter-spacing: -.02em;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 29px;
      line-height: 1.25;
      font-weight: 450;
    }

    form {
      margin-top: 60px;
      display: grid;
      gap: 34px;
    }

    .field { display: grid; gap: 10px; }

    label {
      font-size: 29px;
      line-height: 1.25;
      font-weight: 500;
    }

    input {
      width: 100%;
      height: 76px;
      padding: 0 25px;
      border: 2px solid var(--line);
      border-radius: 17px;
      color: var(--ink);
      background: #fff;
      font-size: 28px;
      line-height: 1;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    input::placeholder { color: var(--placeholder); opacity: 1; }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(42, 91, 86, .12);
    }

    .submit {
      height: 80px;
      margin-top: 0;
      border: 0;
      border-radius: 17px;
      color: #fff;
      background: var(--brand);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: background .16s ease, transform .16s ease, opacity .16s ease;
    }

    .submit:hover { background: var(--brand-hover); }
    .submit:active { transform: translateY(1px); }
    .submit:disabled { cursor: wait; opacity: .72; }

    .message {
      min-height: 24px;
      margin: -18px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.35;
      font-weight: 600;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }
    .message:empty { display: none; }

    .support-copy {
      margin: auto 0 4px;
      padding-top: 32px;
      color: var(--muted);
      text-align: center;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 450;
    }

    @media (max-width: 700px) {
      body { padding: 20px 14px 36px; }

      .login-card {
        min-height: min(850px, calc(100vh - 40px));
        padding: 42px 26px 38px;
        border-radius: 25px;
      }

      .logo { width: 82px; height: 82px; border-radius: 21px; }
      h1 { margin-top: 23px; font-size: clamp(32px, 9vw, 42px); }
      .subtitle { font-size: clamp(21px, 6vw, 27px); }
      form { margin-top: 50px; gap: 27px; }
      label { font-size: 23px; }
      input { height: 68px; padding: 0 20px; border-radius: 15px; font-size: 22px; }
      .submit { height: 70px; border-radius: 15px; font-size: 26px; }
      .support-copy { font-size: 19px; }
    }

    @media (max-width: 700px) and (max-height: 900px) {
      body { padding: 12px; }
      .login-card {
        min-height: calc(100vh - 24px);
        padding: 28px 20px 24px;
      }
      .logo { width: 70px; height: 70px; border-radius: 18px; }
      h1 { margin-top: 18px; font-size: 32px; }
      .subtitle { font-size: 22px; }
      form { margin-top: 36px; gap: 20px; }
      .field { gap: 8px; }
      label { font-size: 21px; }
      input { height: 64px; font-size: 21px; }
      .submit { height: 66px; font-size: 25px; }
      .support-copy { padding-top: 22px; font-size: 17px; }
    }

    @media (max-height: 840px) and (min-width: 701px) {
      body { padding-top: 24px; padding-bottom: 24px; }
      .login-card { min-height: 760px; padding-top: 40px; padding-bottom: 34px; }
      .logo { width: 82px; height: 82px; border-radius: 21px; }
      h1 { margin-top: 20px; font-size: 40px; }
      .subtitle { font-size: 25px; }
      form { margin-top: 42px; gap: 24px; }
      input { height: 66px; }
      .submit { height: 70px; }
    }
  </style>
</head>
<body>
  <main class="login-card" aria-labelledby="portalTitle">
    <header class="brand-block">
      <img class="logo" src="assets/ctg-portal-logo.png" alt="CTG" width="98" height="98" />
      <h1 id="portalTitle">Supply Chain Portal</h1>
      <p class="subtitle">Sign in to your account</p>
    </header>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="identifier">Email / Username</label>
        <input id="identifier" name="identifier" type="text" placeholder="you@example.com" autocomplete="username" autocapitalize="none" spellcheck="false" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button class="submit" id="loginBtn" type="submit">Sign In</button>
      <p class="message" id="loginMessage" role="status" aria-live="polite"></p>
    </form>

    <p class="support-copy">Access is managed by your Supply Chain team.<br />Contact admin to request an account.</p>
  </main>

  <script>
    const DEFAULT_API_URL = "https://ctg-chatdaddy-hermas-agents-runtime.jiazhen-theadspert.workers.dev";
    const MASTER_ADMIN_LOGIN = "masteradmin";
    const MASTER_ADMIN_EMAIL = "masteradmin@ctg.local";
    const params = new URLSearchParams(window.location.search);
    const apiUrl = normalizeApiUrl(params.get("api") || localStorage.getItem("agent_api_url") || DEFAULT_API_URL);
    const form = document.getElementById("loginForm");
    const identifierInput = document.getElementById("identifier");
    const passwordInput = document.getElementById("password");
    const button = document.getElementById("loginBtn");
    const message = document.getElementById("loginMessage");

    localStorage.removeItem("agent_admin_token");
    localStorage.removeItem("agent_staff_token");

    function normalizeApiUrl(value) {
      return String(value || "").trim().replace(/\/+$/, "");
    }

    function loginEmailFor(identifier) {
      const normalized = String(identifier || "").trim().toLowerCase();
      return normalized === MASTER_ADMIN_LOGIN ? MASTER_ADMIN_EMAIL : normalized;
    }

    function dashboardRoleForAccountRole(role) {
      return ["admin", "owner", "super_admin"].includes(String(role || "").toLowerCase()) ? "admin" : "staff";
    }

    function setMessage(text = "", tone = "") {
      message.textContent = text;
      message.className = `message ${tone}`.trim();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const identifier = identifierInput.value.trim();
      const email = loginEmailFor(identifier);
      const password = passwordInput.value;

      if (!identifier || !password) {
        setMessage("Enter your email or username and password.", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "Signing In…";
      setMessage("");

      try {
        const response = await fetch(`${apiUrl}/api/auth/login`, {
          method: "POST",
          credentials: "include",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok || !data.authenticated) {
          throw new Error(data.error || "invalid_credentials");
        }

        const projects = Array.isArray(data.projects) ? data.projects : [];
        const requestedProject = params.get("project_key") || "beyoute";
        const selectedProject = projects.find((item) => item.project_key === requestedProject)
          || projects[0]
          || { project_key: requestedProject };
        const role = dashboardRoleForAccountRole(data.user?.role);
        const session = {
          authMode: "account",
          workspace: selectedProject.project_key || requestedProject,
          projectKey: selectedProject.project_key || requestedProject,
          role,
          accountRole: data.user?.role || role,
          displayName: data.user?.name || data.user?.full_name || (role === "admin" ? "Master Admin" : "Support Team"),
          email: data.user?.email || email,
          apiUrl,
          signedInAt: new Date().toISOString()
        };

        localStorage.setItem("agent_session", JSON.stringify(session));
        localStorage.setItem("agent_project_key", session.projectKey);
        localStorage.setItem("agent_api_url", apiUrl);
        localStorage.removeItem("agent_admin_token");
        localStorage.removeItem("agent_staff_token");
        setMessage("Signed in. Opening your workspace…", "success");

        const next = new URLSearchParams({
          api: apiUrl,
          project_key: session.projectKey,
          role
        });
        if (role === "staff") {
          next.set("view", "inbox");
          window.location.assign(`dashboard/?${next.toString()}`);
        } else {
          window.location.assign(`admin.html?${next.toString()}`);
        }
      } catch (_error) {
        setMessage("The username or password is incorrect.", "error");
        passwordInput.select();
      } finally {
        button.disabled = false;
        button.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
